<div class="task-toggle-container">
  @for (option of options; track option) {
    <div
      class="toggle-option"
      [ngClass]="{ 'active': value === option.value }"
      [style.background-color]="option.background"
      (click)="onChange.emit(option.value)">
      {{ option.label }}
    </div>
  }
</div>
