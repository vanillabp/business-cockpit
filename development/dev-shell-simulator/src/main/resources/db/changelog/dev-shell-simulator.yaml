databaseChangeLog:
  - changeSet:
      id: create_simulator_tables
      author: pelikast
      changes:
        - createTable:
            tableName: SIMULATOR_WORKFLOW_MODULE
            columns:
              - column:
                  name: ID
                  type: varchar(255)
                  constraints:
                    primaryKey: true
              - column:
                  name: VERSION
                  type: bigint
              - column:
                  name: URI
                  type: varchar(255)
              - column:
                  name: ACCESSIBLE_TO_GROUPS
                  type: json
