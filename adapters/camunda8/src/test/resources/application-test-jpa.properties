# Test configuration for JPA integration tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Disable Camunda auto-configuration for tests
spring.autoconfigure.exclude=io.camunda.zeebe.spring.client.configuration.ZeebeClientConfigurationAutoConfiguration
