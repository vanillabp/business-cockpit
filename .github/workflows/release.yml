name: Release 🚀

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Version to release (e.g. 1.2.3)'
        required: true
      npm-bypass-2fa-token:
        description: 'NPM temporary bypass 2FA token. Use this to create one: https://www.npmjs.com/settings/vanillabp/tokens/granular-access-tokens/new'
        required: true
jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Extract last released version
        run: |
          apiUrl="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/latest"
          lastReleasedVersionApiResult=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "${apiUrl}")
          lastReleasedVersion=$(echo "${lastReleasedVersionApiResult}" \
            | jq -r '.tag_name')
          if [ "${lastReleasedVersion}" = "null" ] || [ -z "${lastReleasedVersion}" ]; then
            echo "No GitHub release found using ${apiUrl}, falling back to first commit"
          
            git fetch --quiet --depth=1 origin
            firstCommit=$(git rev-list --max-parents=0 HEAD)
          
            lastReleasedVersion="${firstCommit}"
          else
            # strip leading 'v' if present
            lastReleasedVersion="${lastReleasedVersion#v}"
          fi          
          echo "LAST_RELEASED_VERSION=${lastReleasedVersion}" >> "${GITHUB_ENV}"
          echo "Last released version: ${lastReleasedVersion}"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: adopt
          java-version: 17
          cache: maven
          server-id: vanillabp-central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Configure npm authentication for npmjs.com
        run: |
          echo "//registry.npmjs.com/:_authToken=${{ github.event.inputs.npm-bypass-2fa-token }}" > ~/.npmrc
          echo "registry=https://registry.npmjs.com/" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
          # Retries against CDN replication lag after publishing a dependency
          echo "fetch-retries=10" >> ~/.npmrc
          echo "fetch-retry-mintimeout=20000" >> ~/.npmrc
          echo "fetch-retry-maxtimeout=120000" >> ~/.npmrc
          echo "fetch-retry-factor=2" >> ~/.npmrc

      - name: Create release branch
        run: |
          git checkout -b release/${{ github.event.inputs.release_version }} origin/main

      - name: Set Maven release version
        run: |
          mvn --no-transfer-progress versions:set -DnewVersion=${{ github.event.inputs.release_version }}
          find . -name pom.xml.versionsBackup -delete

      - name: Update npm package.json versions
        run: |
          find . -name package.json | while read file; do
            echo "🔧 Updating $file"
            tmp=$(mktemp)
            jq --arg v "${{ github.event.inputs.release_version }}" '
             .version = $v
             | if .dependencies then
                 .dependencies |= with_entries(
                   if (.key | startswith("@vanillabp/")) 
                   then .value = $v else . end
                 )
               else . end
             | if .devDependencies then
                 .devDependencies |= with_entries(
                   if (.key | startswith("@vanillabp/")) 
                   then .value = $v else . end
                 )
               else . end
             | if .peerDependencies then
                 .peerDependencies |= with_entries(
                   if (.key | startswith("@vanillabp/")) 
                   then .value = $v else . end
                 )
               else . end
            ' "$file" > "$tmp" && mv "$tmp" "$file"
          done

      - name: Check for SNAPSHOT dependencies
        run: |
          SNAPSHOT_POMS=$(grep -R "<.*>.*SNAPSHOT<\/.*>" . --include=pom.xml || true)
          SNAPSHOT_PKGS=$(grep -R "\".*SNAPSHOT\"" . --include=package.json || true)
      
          if [ -n "$SNAPSHOT_POMS" ] || [ -n "$SNAPSHOT_PKGS" ]; then
            echo "::warning::Found SNAPSHOT dependencies in the project:"
            [ -n "$SNAPSHOT_POMS" ] && echo "$SNAPSHOT_POMS"
            [ -n "$SNAPSHOT_PKGS" ] && echo "$SNAPSHOT_PKGS"
          else
            echo "✅ No SNAPSHOT dependencies found."
          fi
          # Always exit successfully
          exit 0
          
      - name: Hacky workaround to avoid npm DNS replication delay between publish and consume
        run: |
          IP=$(getent ahostsv4 registry.npmjs.com | awk '{print $1; exit}')
          if [ -z "$IP" ]; then
            echo "Failed to resolve registry.npmjs.com" >&2
            exit 1
          fi
          echo "Pinning registry.npmjs.com -> $IP"
          echo "$IP registry.npmjs.com" | sudo tee -a /etc/hosts

      - name: Install npm wrapper that waits after publish for registry propagation
        run: |
          mkdir -p "$HOME/.npm-wait"
          cat > "$HOME/.npm-wait/npm" <<'WRAPPER'
          #!/usr/bin/env bash
          # Waits after `npm publish` until the new version is queryable on the
          # registry. npm does not retry ETARGET responses, so a subsequent
          # install/update in the same pipeline can hit a stale CDN node.
          set -e

          SELF=$(readlink -f "$0")
          REAL_NPM=""
          IFS=':' read -ra DIRS <<< "$PATH"
          for dir in "${DIRS[@]}"; do
            candidate="$dir/npm"
            [ -x "$candidate" ] || continue
            [ "$(readlink -f "$candidate")" = "$SELF" ] && continue
            REAL_NPM="$candidate"
            break
          done
          if [ -z "$REAL_NPM" ]; then
            echo "npm wrapper: cannot locate the real npm binary" >&2
            exit 127
          fi

          "$REAL_NPM" "$@"
          RC=$?

          is_publish=false
          for arg in "$@"; do
            [ "$arg" = "publish" ] && { is_publish=true; break; }
          done

          if [ "$is_publish" = true ] && [ $RC -eq 0 ] && [ -f package.json ]; then
            name=$(jq -r '.name // empty' package.json 2>/dev/null || true)
            version=$(jq -r '.version // empty' package.json 2>/dev/null || true)
            if [ -n "$name" ] && [ -n "$version" ]; then
              echo ">>> Waiting for ${name}@${version} to be queryable on registry..."
              for i in $(seq 1 60); do
                if "$REAL_NPM" view "${name}@${version}" version >/dev/null 2>&1; then
                  echo ">>> ${name}@${version} available after attempt ${i}"
                  break
                fi
                sleep 5
              done
            fi
          fi

          exit $RC
          WRAPPER
          chmod +x "$HOME/.npm-wait/npm"
          echo "$HOME/.npm-wait" >> "$GITHUB_PATH"

      - name: Build & deploy to Maven Central and npm
        run: |
          mvn --batch-mode --no-transfer-progress -DskipTests -DskipITs \
            -DaltDeploymentRepository=local::default::file:target/staging \
            -Dnpm.registry=https://registry.npmjs.com \
            -Dgpg.passphrase=$GPG_PASSPHRASE \
            clean deploy -Prelease,central-portal,release-npm
        env:
          GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          MAVEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_PORTAL_TOKEN_USER }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PORTAL_TOKEN_PW }}

      - name: Commit release version
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "Prepare release v${{ github.event.inputs.release_version }}"

      - name: Wait for all @vanillabp/* npm packages to be available on registry
        run: |
          VERSION=${{ github.event.inputs.release_version }}
          NAMES=$(find . -name node_modules -prune -o -name package.json -print | \
            while read -r pkg; do
              name=$(jq -r '.name // ""' "$pkg" 2>/dev/null)
              case "$name" in
                @vanillabp/*) echo "$name" ;;
              esac
            done | sort -u)
          if [ -z "$NAMES" ]; then
            echo "No @vanillabp/* packages found, skipping."
            exit 0
          fi
          for name in $NAMES; do
            echo ">>> Verifying ${name}@${VERSION}..."
            ok=false
            for i in $(seq 1 60); do
              if npm view "${name}@${VERSION}" version >/dev/null 2>&1; then
                echo "  ✓ available (attempt ${i})"
                ok=true
                break
              fi
              sleep 5
            done
            if [ "$ok" = false ]; then
              echo "::error::${name}@${VERSION} did not appear on the registry within timeout"
              exit 1
            fi
          done

      - name: Build runnable JARs
        run: |
          cd container && mvn --batch-mode --no-transfer-progress -DskipTests -DskipITs -Dnpm.registry=https://registry.npmjs.com package spring-boot:repackage -Pskip-release-npm && cd ..
          cd development/simulator && mvn --batch-mode --no-transfer-progress -DskipTests -DskipITs -Dnpm.registry=https://registry.npmjs.com package spring-boot:repackage -Pskip-release-npm && cd ..
          cd dev-shell-simulator && mvn --batch-mode --no-transfer-progress -DskipTests -DskipITs -Dnpm.registry=https://registry.npmjs.com package spring-boot:repackage -Pskip-release-npm && cd ../..

      - name: Create Git tag
        run: |
          git tag -a "${{ github.event.inputs.release_version }}" -m "Release ${{ github.event.inputs.release_version }}"
          git push origin --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_version }}
          name: v${{ github.event.inputs.release_version }}
          generate_release_notes: true
          append_body: |
            
            **Full Changelog:** [`${{ env.LAST_RELEASED_VERSION }}...${{ github.event.inputs.release_version }}`](https://github.com/vanillabp/business-cockpit/compare/${{ env.LAST_RELEASED_VERSION }}...${{ github.event.inputs.release_version }})
          files: |
            **/*-runnable.jar
          draft: true

      - name: Calculate next snapshot version
        run: |
          RELEASE_VERSION=${{ github.event.inputs.release_version }}
          IFS='.' read -r major minor patch <<< "$RELEASE_VERSION"
          NEXT_PATCH=$((patch + 1))
          echo "NEXT_SNAPSHOT=$major.$minor.${NEXT_PATCH}-SNAPSHOT" >> $GITHUB_ENV

      - name: Set next snapshot version
        run: |
          mvn --no-transfer-progress versions:set -DnewVersion=${{ env.NEXT_SNAPSHOT }}
          find . -name pom.xml.versionsBackup -delete

          SNAP_BASE=$(echo "${{ env.NEXT_SNAPSHOT }}" | sed 's/-SNAPSHOT//')
          NEXT_PATCH=$(echo $SNAP_BASE | awk -F. '{$NF++; print}' OFS=.)

          # Update all package.json files using jq excluding node_modules
          find . -name node_modules -prune -o -name package.json -print | while read file; do
            echo "🔧 Updating $file"
            tmp=$(mktemp)

            jq --arg v "${{ env.NEXT_SNAPSHOT }}" \
               --arg range ">=${{ env.NEXT_SNAPSHOT }} <${NEXT_PATCH}" '
              .version = $v
              | if .dependencies then
                  .dependencies |= with_entries(
                    if (.key | startswith("@vanillabp/"))
                    then .value = $range else . end
                  )
                else . end
              | if .devDependencies then
                  .devDependencies |= with_entries(
                    if (.key | startswith("@vanillabp/"))
                    then .value = $range else . end
                  )
                else . end
              | if .peerDependencies then
                  .peerDependencies |= with_entries(
                    if (.key | startswith("@vanillabp/"))
                    then .value = $range else . end
                  )
                else . end
            ' "$file" > "$tmp" && mv "$tmp" "$file"
          done

      - name: Configure npm authentication for GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > ~/.npmrc
          echo "@vanillabp:registry=https://npm.pkg.github.com/" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
      - name: Build & publish new snapshot packages
        run: |
          mvn --batch-mode --no-transfer-progress -s $GITHUB_WORKSPACE/.github/workflows/github-packages-settings.xml \
          -Dnpm.prerelease=0 \
          -Dnpm.registry=https://npm.pkg.github.com/ \
          deploy
        env:
          USER_NAME: ${{ secrets.VANILLABP_USER_NAME }}
          USER_TOKEN: ${{ secrets.VANILLABP_USER_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit next snapshot version
        run: |
          git add -A
          git commit -m "Set next version ${{ env.NEXT_SNAPSHOT }}"
          git push origin HEAD:release/${{ github.event.inputs.release_version }}
          
      - name: Create PR to merge release branch into main
        run: |
          gh auth login --with-token <<< "${{ secrets.GITHUB_TOKEN }}"
          gh pr create \
            --title "Merge release/${{ github.event.inputs.release_version }} into main" \
            --body "Automated PR to merge release branch." \
            --base main \
            --head release/${{ github.event.inputs.release_version }}
